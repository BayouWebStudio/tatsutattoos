<!DOCTYPE html>
<html>
<head>
    <title>Request Changes - tatsutattoos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 2rem; }
        .form { background: #f5f5f5; padding: 2rem; border-radius: 8px; }
        input, textarea { width: 100%; margin: 0.5rem 0; padding: 0.5rem; }
        button { background: #007cba; color: white; padding: 1rem 2rem; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Request Changes</h1>
    <p>Need updates to your website? Submit your request below.</p>
    <form action="https://formspree.io/f/mgolqdey" method="POST" class="form">
        <input type="hidden" name="_subject" value="🔷 Change Request - tatsutattoos">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="text" name="site" value="tatsutattoos" readonly>
        <select name="section" required>
            <option value="">Select Section</option>
            <option value="Hero / Header">Hero / Header</option>
            <option value="About">About</option>
            <option value="Gallery">Gallery</option>
            <option value="Contact">Contact</option>
            <option value="Other">Other</option>
        </select>
        <textarea name="change_description" placeholder="Describe the change you need" required rows="4"></textarea>
        <select name="priority">
            <option value="Normal">Normal Priority</option>
            <option value="Urgent">Urgent</option>
        </select>
        <textarea name="additional_notes" placeholder="Any additional notes" rows="2"></textarea>
        <input type="hidden" name="_next" value="https://bayouwebstudio.com/thanks">
        <button type="submit">Submit Request</button>
    
    <div style="margin-top:2rem;padding-top:2rem;border-top:1px solid #333">
      <h3 style="margin-bottom:0.5rem;color:#fff">📷 Upload Photos to Your Gallery</h3>
      <p style="color:#aaa;font-size:0.9rem;margin-bottom:1rem">JPG or PNG only &middot; Max 20MB per photo &middot; Up to 10 photos at once &middot; Live on your site within 2 minutes</p>
      <input type="file" id="uploadFiles" accept=".jpg,.jpeg,.png" multiple style="margin-bottom:1rem;display:block;color:#fff">
      <button type="button" id="uploadBtn" style="background:#fff;color:#111;border:none;padding:0.75rem 1.5rem;border-radius:6px;cursor:pointer;font-size:1rem;font-weight:600">Upload Photos</button>
      <div id="uploadStatus" style="margin-top:1rem;font-size:0.9rem"></div>
    </div>
    <script>
    const CLIENT_KEY="tatsutattoos",CLIENT_SECRET="J85GVF_7_bwbsyUUttXiXQ",CLIENT_EMAIL="tatsu@tatsuink.com",CLIENT_NAME="Tatsu";
    document.getElementById("uploadBtn").addEventListener("click",async function(){
      const files=document.getElementById("uploadFiles").files;
      const status=document.getElementById("uploadStatus");
      if(!files.length){status.textContent="Please select at least one photo.";return;}
      if(files.length>10){status.textContent="Max 10 photos at once.";return;}
      status.innerHTML="<span style='color:#aaa'>Uploading... please wait</span>";
      this.disabled=true;
      const fd=new FormData();
      fd.append("client",CLIENT_KEY);fd.append("secret",CLIENT_SECRET);
      fd.append("email",CLIENT_EMAIL);fd.append("name",CLIENT_NAME);
      for(const f of files) fd.append("files",f);
      try{
        const r=await fetch("https://api.bayouwebstudio.com/api/upload",{method:"POST",body:fd});
        const d=await r.json();
        if(d.success){status.innerHTML="<span style='color:#4ade80'>✅ "+d.message+"</span>";}
        else{status.innerHTML="<span style='color:#f87171'>❌ "+(d.error||d.message)+"</span>";}
      }catch(e){status.innerHTML="<span style='color:#f87171'>❌ Upload failed. Email support@bayouwebstudio.com</span>";}
      this.disabled=false;
    });
    </script>
</form>
</body>
</html>
